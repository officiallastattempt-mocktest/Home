let timerInterval;
let timeLeft=20;
const QUESTION_TIME=20;

function random(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function factorial(n){
    let r=1;
    for(let i=2;i<=n;i++) r*=i;
    return r;
}

/* -------- Superscript converter -------- */
function formatSuperscript(text){
    return text.replace(/\^(\d+)/g,"<sup>$1</sup>");
}

/* -------- Timer -------- */
function startTimer(){
    clearInterval(timerInterval);
    timeLeft=QUESTION_TIME;
    document.getElementById("time").innerText=timeLeft;

    timerInterval=setInterval(()=>{
        timeLeft--;
        document.getElementById("time").innerText=timeLeft;

        if(timeLeft<=0){
            clearInterval(timerInterval);
            autoWrong();
        }
    },1000);
}

function autoWrong(){
    if(!history[currentIndex].answered){
        wrongCount++;
        document.getElementById("wrong").innerText=wrongCount;
        showCorrectAnswer();
document.getElementById("explanation").innerHTML=
    formatSuperscript(history[currentIndex].explanation) + "<br><br>(Time Over)";
        document.getElementById("explanation").style.display="block";
        history[currentIndex].answered=true;
        disableOptions();
    }
}

/* -------- Engine -------- */

function createQuestion(question,answer,explanation){
    let options=[answer];

    while(options.length<4){
        let fake=answer+[-20,-10,10,20,30,40,50][random(0,6)];
        if(fake!==answer && !options.includes(fake)){
            options.push(fake);
        }
    }

    options.sort(()=>Math.random()-0.5);
    return {question,answer,options,explanation,answered:false};
}

function getNewQuestion(){
    if(usedCases.length===cases.length) usedCases=[];
    let available=cases.map((_,i)=>i).filter(i=>!usedCases.includes(i));
    let index=available[random(0,available.length-1)];
    usedCases.push(index);
    return cases[index]();
}

function loadQuestion(q){
    document.getElementById("qNumber").innerText="Question "+(currentIndex+1);
    document.getElementById("question").innerHTML=formatSuperscript(q.question);

    let optDiv=document.getElementById("options");
    optDiv.innerHTML="";
    document.getElementById("explanation").style.display="none";

    q.options.forEach(opt=>{
        let btn=document.createElement("button");
        btn.className="option";
        btn.innerText=opt;

        btn.onclick=function(){
            if(q.answered) return;
            q.answered=true;
            clearInterval(timerInterval);

            if(opt===q.answer){
                btn.classList.add("correct");
                correctCount++;
                document.getElementById("correct").innerText=correctCount;
            }else{
                btn.classList.add("wrong");
                wrongCount++;
                document.getElementById("wrong").innerText=wrongCount;
            }

            showCorrectAnswer();
            document.getElementById("explanation").innerHTML=formatSuperscript(q.explanation);
            document.getElementById("explanation").style.display="block";
            disableOptions();
        }

        optDiv.appendChild(btn);
    });

    startTimer();
}

function showCorrectAnswer(){
    document.querySelectorAll(".option").forEach(b=>{
        if(Number(b.innerText)===history[currentIndex].answer){
            b.classList.add("correct");
        }
    });
}

function disableOptions(){
    document.querySelectorAll(".option").forEach(b=>b.disabled=true);
}

function nextQuestion(){
    if(currentIndex<history.length-1){
        currentIndex++;
        loadQuestion(history[currentIndex]);
    }else{
        let q=getNewQuestion();
        history.push(q);
        currentIndex++;
        loadQuestion(q);
    }
}

function previousQuestion(){
    if(currentIndex>0){
        currentIndex--;
        loadQuestion(history[currentIndex]);
    }
}

nextQuestion();






/* -------- Finger Writing Notepad -------- */

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    clearCanvas();
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing=false;

function startDraw(e){
    drawing=true;
    draw(e);
}

function endDraw(){
    drawing=false;
    ctx.beginPath();
}

function draw(e){
    if(!drawing) return;

    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#00BFFF"; // glowing blue
    ctx.shadowColor = "#00BFFF";
    ctx.shadowBlur = 8;

    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchend", endDraw);
canvas.addEventListener("touchmove", draw);

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* -------- Auto Clear on Next -------- */

const originalNext = nextQuestion;

nextQuestion = function(){
    clearCanvas();
    originalNext();
};
